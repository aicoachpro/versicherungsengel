services:
  app:
    build: .
    restart: always
    environment:
      - AUTH_SECRET=voelker-finance-demo-secret-key-2024
      - AUTH_TRUST_HOST=true
      - AUTH_URL=https://demo.voelkergroup.cloud
      - DEMO_MODE=true
    volumes:
      - demo_data:/app/data
    labels:
      - traefik.enable=true
      - traefik.http.routers.demo.rule=Host(`demo.voelkergroup.cloud`)
      - traefik.http.routers.demo.tls=true
      - traefik.http.routers.demo.entrypoints=web,websecure
      - traefik.http.routers.demo.tls.certresolver=mytlschallenge
      - traefik.http.services.demo.loadbalancer.server.port=3000
    networks:
      - root_default

volumes:
  demo_data:

networks:
  root_default:
    external: true
